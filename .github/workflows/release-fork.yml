# Multi-platform release builder for Aaron's fork.
#
# Triggered by pushing a v*.*.* tag (or manually). Builds Android, iOS, Linux,
# Windows, macOS and Web from the tagged commit and attaches the artifacts to
# the GitHub release. Distinct from the inherited upstream `publish.yml`
# (which targets winget/homebrew/Play Store and uses unpinned Flutter).
#
# Release stays a DRAFT until complete: every platform attaches its artifact to
# a draft release, and the separate `publish` job flips it to published only
# after all six builds succeed. A failed platform leaves the release a draft.
# So the release is never public with missing artifacts.
#
# Maintainer flow for a release (e.g. v0.7.2):
#   1. gh release create v0.7.2 --target <sha> --notes-file notes.md --draft
#   2. git tag v0.7.2 <sha> && git push origin v0.7.2   # triggers this build
# The draft (with its notes) is filled in by the builds, then auto-published.
#
# Android is signed with the repo's debug keystore (stored as secrets) so CI
# builds keep the same signature as locally-built debug APKs — installs upgrade
# cleanly instead of being rejected for a signature mismatch.
#
# iOS is built UNSIGNED (no Apple Developer account needed). The resulting
# .ipa is not installable directly — users re-sign it themselves via AltStore /
# SideStore / TrollStore. See the release notes / docs install section.
name: Release (fork)

on:
  workflow_dispatch:
  # Weekly all-platform dry run: catches iOS/macOS breakage before release day
  # (the PR check builds a single platform). Without a tag ref, the
  # release-attach and publish steps are skipped, so nothing is published.
  schedule:
    - cron: '0 6 * * 1'
  push:
    tags:
      - "v*.*.*"

env:
  pkg_name: tsumiru

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: web
          - os: macos-latest
            target: macos
          - os: macos-latest
            target: ios
          # Pinned to 2022: windows-latest (Server 2025) ships VS 2022 in a
          # layout Flutter 3.32.4 fails to detect, so CMake falls back to the
          # "Visual Studio 16 2019" generator and can't find an instance.
          - os: windows-2022
            target: windows

    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - name: Set up Java (Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Install Linux build deps
        if: matrix.target == 'linux'
        # Bounded retries/timeouts so a flaky Azure apt mirror can't hang the
        # job for 20+ minutes (it did on the first run).
        run: |
          opts="-o Acquire::Retries=3 -o Acquire::http::Timeout=25 -o Acquire::https::Timeout=25"
          sudo apt-get $opts update
          sudo apt-get $opts install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libx11-dev libblkid-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev
          # libsecret + jsoncpp are required by flutter_secure_storage_linux
          # (used by the simple_login / ui_login credential store).

      - name: Enable desktop targets
        if: matrix.target == 'linux' || matrix.target == 'macos' || matrix.target == 'windows'
        run: flutter config --enable-linux-desktop --enable-macos-desktop --enable-windows-desktop

      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure Android signing
        if: matrix.target == 'android'
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.jks
          {
            echo "storeFile=release-keystore.jks"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > key.properties

      # ---- builds ----
      - name: Build Android
        if: matrix.target == 'android'
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Build ${{ matrix.target }}
        # Linux is built by fastforge in the AppImage step below (and by the Flatpak workflow).
        # iOS needs --no-codesign, handled in its own step below.
        if: matrix.target != 'android' && matrix.target != 'linux' && matrix.target != 'ios'
        run: flutter build ${{ matrix.target }} --release

      - name: Build iOS (unsigned)
        if: matrix.target == 'ios'
        # No Apple Developer account / signing certs in CI — build an unsigned
        # binary. Flutter runs `pod install` automatically as part of this.
        run: flutter build ios --release --no-codesign

      # ---- package into dist/ ----
      - name: Package Android
        if: matrix.target == 'android'
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk            "dist/${pkg_name}-${{ github.ref_name }}-android-universal.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  "dist/${pkg_name}-${{ github.ref_name }}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/${pkg_name}-${{ github.ref_name }}-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     "dist/${pkg_name}-${{ github.ref_name }}-android-x86_64.apk"

      - name: Build Linux AppImage
        if: matrix.target == 'linux'
        env:
          # appimagetool is itself an AppImage; extract-and-run avoids needing FUSE on CI.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # Official appimagetool (fastforge shells out to it).
          sudo wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool
          # fastforge's AppImage maker may call `locate` for include resolution.
          sudo apt-get install -y --no-install-recommends plocate && sudo updatedb || true
          dart pub global activate fastforge
          export PATH="$PATH:$HOME/.pub-cache/bin"
          # Builds `flutter build linux --release` + packages an AppImage.
          fastforge package --platform linux --targets appimage
          # Collect the AppImage into dist/ with our release naming.
          mkdir -p dist
          built="$(find dist -name '*.AppImage' | head -1)"
          mv "$built" "dist/${pkg_name}-${{ github.ref_name }}-linux-x86_64.AppImage"
          # Drop fastforge's version subdir so the release only attaches our named files.
          find dist -mindepth 1 -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Package Web
        if: matrix.target == 'web'
        working-directory: build/web
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          zip -r "$GITHUB_WORKSPACE/dist/${pkg_name}-${{ github.ref_name }}-web.zip" *

      - name: Package macOS
        if: matrix.target == 'macos'
        run: |
          mkdir -p dist
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          # Guard: the SQLite native lib must be bundled inside the app. On macOS
          # it ships as a code-asset framework (sqlite3.framework), not a loose
          # dylib. Absence is the error-126 DB-open crash we shipped on Windows
          # in 0.9.0/0.9.1.
          sqlite=$(find "$APP" \( -iname '*sqlite3*.dylib' -o -iname 'sqlite3*.framework' \))
          if [ -z "$sqlite" ]; then
            echo "::error::sqlite3 native library missing from the macOS bundle"
            find "$APP/Contents/Frameworks" -maxdepth 1 2>/dev/null; exit 1
          fi
          echo "Bundled SQLite: $sqlite"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/${pkg_name}-${{ github.ref_name }}-macos-x64.zip"

      - name: Package iOS (unsigned IPA)
        if: matrix.target == 'ios'
        # An .ipa is just a zip with the .app inside a top-level Payload/ dir.
        run: |
          mkdir -p dist Payload
          APP=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" | head -1)
          cp -R "$APP" Payload/
          zip -r -y "dist/${pkg_name}-${{ github.ref_name }}-ios.ipa" Payload
          rm -rf Payload

      - name: Package Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # Bundle the MSVC runtime DLLs (msvcp140 / vcruntime140 / *_1) next to
          # the exe, so the app runs on machines WITHOUT the Visual C++
          # Redistributable installed. Without these the window opens but never
          # paints — a blank white screen — on otherwise-fine PCs.
          $redist = vswhere -latest -find 'VC\Redist\MSVC\*\x64\*\*.dll'
          Copy-Item $redist build\windows\x64\runner\Release\ -Force
          # Guard: the SQLite native library must be bundled next to the exe.
          # Its absence was the error-126 DB-open crash in 0.9.0/0.9.1.
          $sqlite = Get-ChildItem build\windows\x64\runner\Release\ -Filter *.dll |
            Where-Object { $_.Name -match 'sqlite3' }
          if (-not $sqlite) {
            Get-ChildItem build\windows\x64\runner\Release\ | Select-Object Name
            throw "sqlite3 native library missing from the Windows bundle"
          }
          Write-Host "Bundled SQLite: $($sqlite.Name)"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "dist\${env:pkg_name}-${{ github.ref_name }}-windows-x64.zip"

      - name: Attach to the draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          # Keep the release a DRAFT while every platform attaches. It is
          # published only by the `publish` job below, once all six builds
          # have succeeded, so users never see a release with missing or
          # partial artifacts. action-gh-release leaves an existing release's
          # body untouched when no body is given, so notes set on the draft
          # beforehand are preserved.
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish the release
    # Runs only after EVERY matrix build job succeeds. If any platform fails,
    # this job is skipped and the release stays a draft for the maintainer to
    # fix and re-run, so an incomplete release is never made public.
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish now that all six platforms have attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # Guard: refuse to publish a release with empty notes (the draft
          # should have been created with notes before tagging). Leaving it a
          # draft is safer than publishing a blank release.
          body=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          if [ -z "${body// /}" ]; then
            echo "::error::Release $TAG has an empty body; leaving it as a draft. Add notes, then re-run this job."
            exit 1
          fi
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
      # The docs site bakes release data in at build time; nudge it to rebuild
      # so tsumiru.app shows this release immediately instead of on the next
      # scheduled refresh. Best-effort: never fail the release over it.
      - name: Trigger docs-site rebuild
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "WEBSITE_DISPATCH_TOKEN not set; skipping site refresh (6h schedule will pick it up)."
            exit 0
          fi
          gh api repos/tsumiru-app/tsumiru-app.github.io/dispatches \
            -f event_type=app-release
