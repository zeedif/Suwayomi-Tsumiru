# Build, GPG-sign and publish a self-hosted Flatpak repo to GitHub Pages.
#
# Flutter can't build inside flatpak-builder's sandbox, so this is two stages:
#   1. build-bundle  — `flutter build linux` on the host, upload as an artifact
#   2. flatpak       — in the freedesktop container, package the prebuilt bundle
#                      with flatpak-builder (via flatter), sign, and upload the
#                      OSTree repo as a Pages artifact
#   3. deploy        — publish the Pages artifact (-> suwayomi.github.io/Suwayomi-Tsumiru)
name: Flatpak

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: flatpak-pages
  cancel-in-progress: false

jobs:
  build-bundle:
    name: Build Linux bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true
      - name: Install Linux build deps
        run: |
          opts="-o Acquire::Retries=3 -o Acquire::http::Timeout=25"
          sudo apt-get $opts update
          sudo apt-get $opts install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libx11-dev libblkid-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Stage bundle next to the manifest
        run: |
          mkdir -p flatpak/bundle
          cp -r build/linux/x64/release/bundle/. flatpak/bundle/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: flatpak/bundle

  flatpak:
    name: Build & sign Flatpak
    needs: build-bundle
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      - name: Restore prebuilt bundle into the manifest dir
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: flatpak/bundle
      - name: Import GPG signing key
        run: echo "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Stamp the app version into the AppStream metainfo
        # The checked-in <releases> list goes stale the moment it's written;
        # generate the current entry from pubspec.yaml at package time instead.
        run: |
          version="$(sed -n 's/^version: \([0-9.]*\)+.*/\1/p' pubspec.yaml)"
          today="$(date -u +%F)"
          entry="<releases>\n    <release version=\"$version\" date=\"$today\">\n      <url>https://github.com/Suwayomi/Suwayomi-Tsumiru/releases/tag/v$version</url>\n    </release>\n  </releases>"
          perl -0pi -e "s|<releases>.*</releases>|$entry|s" flatpak/io.github.aaronbamblett.tsumiru.metainfo.xml
          grep -A3 "<releases>" flatpak/io.github.aaronbamblett.tsumiru.metainfo.xml | head -5
      - uses: andyholmes/flatter@main
        with:
          files: flatpak/io.github.aaronbamblett.tsumiru.yml
          gpg-sign: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          upload-pages-artifact: true
          upload-pages-includes: |
            flatpak/tsumiru-repo.gpg
            flatpak/io.github.aaronbamblett.tsumiru.flatpakref

  deploy:
    name: Deploy Pages
    needs: flatpak
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
