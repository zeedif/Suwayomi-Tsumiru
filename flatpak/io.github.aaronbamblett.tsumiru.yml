# Flatpak manifest for Tsumiru.
#
# Packages a PRE-BUILT `flutter build linux` bundle (flatpak-builder runs
# offline, so Flutter is built outside the sandbox in CI and the bundle is
# dropped in here). CI is expected to place the bundle at ./bundle before
# running flatpak-builder against this manifest (see the release workflow).
app-id: io.github.aaronbamblett.tsumiru
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: tsumiru

finish-args:
  - --share=ipc
  - --share=network            # talks to the user's Suwayomi server
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri               # GPU-accelerated rendering
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets   # libsecret credential store (host keyring)

modules:
  # flutter_secure_storage_linux needs libsecret, which isn't in the
  # freedesktop runtime. Build it against the SDK so it's ABI-compatible.
  # (jsoncpp was dropped: secure_storage 10's Linux impl no longer uses it.)
  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dmanpage=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dvapi=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
        sha256: 6b452e4750590a2b5617adc40026f28d2f4903de15f1250e1d1c40bfd68ed55e

  - name: tsumiru
    buildsystem: simple
    build-commands:
      # App bundle → /app/tsumiru, with the binary linked onto PATH.
      - mkdir -p /app/tsumiru
      - cp -r bundle/* /app/tsumiru/
      # GitHub artifacts drop the executable bit on the round-trip, so restore it.
      - chmod +x /app/tsumiru/tsumiru
      - mkdir -p /app/bin
      - ln -s /app/tsumiru/tsumiru /app/bin/tsumiru
      # Desktop integration metadata.
      - install -Dm644 io.github.aaronbamblett.tsumiru.desktop /app/share/applications/io.github.aaronbamblett.tsumiru.desktop
      - install -Dm644 io.github.aaronbamblett.tsumiru.metainfo.xml /app/share/metainfo/io.github.aaronbamblett.tsumiru.metainfo.xml
      - install -Dm644 io.github.aaronbamblett.tsumiru.png /app/share/icons/hicolor/512x512/apps/io.github.aaronbamblett.tsumiru.png
    sources:
      # This dir — packaging files plus the CI-placed ./bundle (the Flutter build).
      - type: dir
        path: .
