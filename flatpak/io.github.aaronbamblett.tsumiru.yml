# Flatpak manifest for Tsumiru.
#
# Packages a PRE-BUILT `flutter build linux` bundle (flatpak-builder runs
# offline, so Flutter is built outside the sandbox in CI and the bundle is
# dropped in here). CI is expected to place the bundle at ./bundle before
# running flatpak-builder against this manifest (see the release workflow).
app-id: io.github.aaronbamblett.tsumiru
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: tsumiru

finish-args:
  - --share=ipc
  - --share=network            # talks to the user's Suwayomi server
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri               # GPU-accelerated rendering
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets   # libsecret credential store (host keyring)

modules:
  # flutter_secure_storage_linux needs libsecret + jsoncpp, which aren't in the
  # freedesktop runtime. Build them against the SDK so they're ABI-compatible.
  - name: jsoncpp
    buildsystem: meson
    config-opts:
      - -Dtests=false
    sources:
      - type: archive
        url: https://github.com/open-source-parsers/jsoncpp/archive/refs/tags/1.9.6.tar.gz
        sha256: f93b6dd7ce796b13d02c108bc9f79812245a82e577581c4c9aabe57075c90ea2

  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dmanpage=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dvapi=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
        sha256: 6b452e4750590a2b5617adc40026f28d2f4903de15f1250e1d1c40bfd68ed55e

  # sqlite3 3.x (pulled in by the drift/codegen upgrade) switched the Dart
  # `sqlite3` package to native-FFI symbol resolution, which needs a real
  # `libsqlite3.so`. sqlite3_flutter_libs compiles SQLite into its plugin with
  # hidden symbols and never emits that file, and the freedesktop runtime only
  # ships `libsqlite3.so.0` — so on Linux the app can't open its database and
  # dies at startup. Build the SQLite amalgamation here (matching the feature
  # flags sqlite3_flutter_libs enables) and drop it in /app/lib.
  - name: sqlite3
    buildsystem: simple
    build-commands:
      - |
        gcc -shared -fPIC -O2 -o libsqlite3.so.0 sqlite3.c \
          -DSQLITE_ENABLE_DBSTAT_VTAB -DSQLITE_ENABLE_FTS5 \
          -DSQLITE_ENABLE_RTREE -DSQLITE_ENABLE_MATH_FUNCTIONS \
          -DSQLITE_ENABLE_SESSION -DSQLITE_ENABLE_PREUPDATE_HOOK \
          -DSQLITE_DQS=0 -DSQLITE_DEFAULT_MEMSTATUS=0 -DSQLITE_TEMP_STORE=2 \
          -DSQLITE_STRICT_SUBTYPE=1 -DSQLITE_THREADSAFE=1 \
          -Wl,-soname,libsqlite3.so.0 -lm -lpthread
      - install -Dm755 libsqlite3.so.0 /app/lib/libsqlite3.so.0
      - ln -sf libsqlite3.so.0 /app/lib/libsqlite3.so
    sources:
      - type: archive
        url: https://sqlite.org/2026/sqlite-autoconf-3520000.tar.gz
        sha256: f6b50b0c103392af32a8be15b2b9d25959de9a00a70c3979128aafeaa5338b3f

  - name: tsumiru
    buildsystem: simple
    build-commands:
      # App bundle → /app/tsumiru, with the binary linked onto PATH.
      - mkdir -p /app/tsumiru
      - cp -r bundle/* /app/tsumiru/
      # GitHub artifacts drop the executable bit on the round-trip, so restore it.
      - chmod +x /app/tsumiru/tsumiru
      - mkdir -p /app/bin
      - ln -s /app/tsumiru/tsumiru /app/bin/tsumiru
      # Desktop integration metadata.
      - install -Dm644 io.github.aaronbamblett.tsumiru.desktop /app/share/applications/io.github.aaronbamblett.tsumiru.desktop
      - install -Dm644 io.github.aaronbamblett.tsumiru.metainfo.xml /app/share/metainfo/io.github.aaronbamblett.tsumiru.metainfo.xml
      - install -Dm644 io.github.aaronbamblett.tsumiru.png /app/share/icons/hicolor/512x512/apps/io.github.aaronbamblett.tsumiru.png
    sources:
      # This dir — packaging files plus the CI-placed ./bundle (the Flutter build).
      - type: dir
        path: .
